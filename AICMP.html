<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 中醫師 - 智能辨證系統</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #f4f1ea; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #8c2727; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #e2d1b3; color: #333; }
        .ai { align-self: flex-start; background-color: #fff; border: 1px solid #dcdcdc; color: #2c3e50; }
        footer { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { background-color: #8c2727; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<header>
    <h2>🌿 AI 中醫師 (Qwen 2.5)</h2>
    <small>亞洲首個智能辨證原型 - 東京節點</small>
</header>

<div id="chat-container">
    <div class="message ai">尊駕請坐。請告知您的症狀、舌苔或脈象，老夫為您辨證。</div>
</div>

<footer>
    <input type="text" id="user-input" placeholder="例如：最近畏寒、發熱、無汗...">
    <button id="send-btn">問診</button>
</footer>

<script>
    const API_KEY = 'AQ.Ab8RN6KzR_m-Y1IbYEoF5hKZhZn0ZwMN7KeLM97qFUbh4yA61Q'; // 👈 這裡貼上你的 API Key
    const ENDPOINT_URL = 'https://asia-northeast1-prediction.googleapis.com/v1/projects/288929141034/locations/asia-northeast1/endpoints/mg-endpoint-2ca72caf-32d9-445b-882d-fc6e3f04bd02:predict';

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

async function askAI() {
    const prompt = userInput.value.trim();
    if (!prompt) return;

    appendMessage('user', prompt);
    userInput.value = '';
    sendBtn.disabled = true; // 防止重複點擊

    // 🌟 關鍵修改：換成你剛剛在終端機看到的 Firebase Function URL
    const CLOUD_FUNCTION_URL = 'https://tcmassistant-xxxx-uc.a.run.app'; 

    try {
        const response = await fetch(CLOUD_FUNCTION_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            // 我們把問題包裝成 JSON 傳給 Firebase
            body: JSON.stringify({ prompt: prompt })
        });

        if (!response.ok) {
            throw new Error('伺服器回應異常');
        }

        const data = await response.json();
        
        // 🌟 這裡要對應 Firebase Function 回傳的格式 { answer: "..." }
        if (data.answer) {
            appendMessage('ai', data.answer);
        } else {
            appendMessage('ai', "醫案解析中，請稍候再試。");
        }

    } catch (error) {
        console.error("詳細錯誤：", error);
        appendMessage('ai', "【連線失敗】請確認後台服務是否正常啟動。");
    } finally {
        sendBtn.disabled = false;
    }
}

    sendBtn.addEventListener('click', askAI);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
</script>

</body>
</html>
